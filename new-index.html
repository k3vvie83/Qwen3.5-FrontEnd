<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qwen Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; height: 100%; }

    .top-bar { height: 60px; border-bottom: 1px solid #30363d; display: flex; align-items: center; padding: 0 24px; gap: 16px; }
    .top-bar h1 { font-size: 1.2rem; color: #58a6ff; }

    .controls { height: 56px; border-bottom: 1px solid #30363d; display: flex; gap: 12px; padding: 0 24px; flex-wrap: wrap; align-items: center; }
    .controls label { display: flex; align-items: center; gap: 6px; font-size: 0.9rem; }
    .controls select, .controls input { background: #161b22; border: 1px solid #30363d; color: #e6edf3; padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; }
    .controls select { cursor: pointer; }
    .controls input[type="number"] { width: 80px; }

    .middle-bar { height: calc(100% - 60px - 56px - 88px); overflow-y: auto; }
    .chat { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .message { max-width: 800px; padding: 12px 16px; border-radius: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .message.user { background: #238636; align-self: flex-end; border-bottom-right-radius: 4px; }
    .message.assistant { background: #21262d; align-self: flex-start; border-bottom-left-radius: 4px; }
    .message.error { background: #f85149; color: #fff; align-self: flex-start; }

    .bottom-bar { height: 88px; border-top: 1px solid #30363d; display: flex; gap: 12px; padding: 16px 24px; align-items: center; }
    .bottom-bar textarea { flex: 1; background: #161b22; border: 2px solid #58a6ff; color: #e6edf3; padding: 12px; border-radius: 8px; resize: none; height: 56px; font-size: 0.95rem; line-height: 1.5; }
    .bottom-bar textarea:focus { outline: none; border-color: #58a6ff; }
    .bottom-bar button { background: #238636; border: none; color: #fff; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: background 0.2s; }
    .bottom-bar button:hover { background: #2ea043; }
    .bottom-bar button:disabled { background: #30363d; cursor: not-allowed; }

    .loading { display: none; color: #8b949e; font-style: italic; padding: 0 24px 8px; }
  </style>
</head>
<body>
  <div class="top-bar">
    <h1>Qwen Chat</h1>
  </div>

  <div class="controls">
    <label>Model: <select id="model"><option value="qwen3-5-122b">qwen3-5-122b</option><option value="qwen3-6-35b-a3b">qwen3-6-35b-a3b</option></select></label>
    <label>Temp: <input type="number" id="temp" value="1.0" min="0" max="2" step="0.1"></label>
    <label>Max Tokens: <input type="number" id="maxTokens" value="2048" min="1" max="8192"></label>
    <label>Top P: <input type="number" id="topP" value="0.95" min="0" max="1" step="0.05"></label>
  </div>

  <div class="middle-bar" id="middle-bar">
    <div class="chat" id="chat"></div>
  </div>

  <div class="bottom-bar">
    <textarea id="input" placeholder="Ask something..." rows="1"></textarea>
    <button id="send">Send</button>
  </div>

  <div class="loading" id="loading">Generating response...</div>

  <script>
    const API_URL = 'r/v1/chat/completions';

    const chat = document.getElementById('chat');
    const middleBar = document.getElementById('middle-bar');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const loading = document.getElementById('loading');

    const model = document.getElementById('model');
    const temp = document.getElementById('temp');
    const maxTokens = document.getElementById('maxTokens');
    const topP = document.getElementById('topP');

    let messages = [];
    let isGenerating = false;
    let abortController = null;

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = content;
      chat.appendChild(div);
      middleBar.scrollTop = middleBar.scrollHeight;
      return div;
    }

    async function send() {
      const text = input.value.trim();
      if (!text || isGenerating) return;

      messages.push({ role: 'user', content: text });
      addMessage('user', text);
      input.value = '';

      isGenerating = true;
      sendBtn.disabled = true;
      loading.style.display = 'block';

      abortController = new AbortController();
      let fullResponse = '';
      const assistantDiv = addMessage('assistant', '');

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: model.value,
            messages: messages,
            max_tokens: parseInt(maxTokens.value),
            temperature: parseFloat(temp.value),
            top_p: parseFloat(topP.value),
            stream: true
          }),
          signal: abortController.signal
        });

        if (!response.ok) {
          const err = await response.text();
          throw new Error(`Error ${response.status}: ${err}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed || trimmed === 'data: [DONE]') continue;
            if (trimmed.startsWith('data: ')) {
              try {
                const data = JSON.parse(trimmed.substring(6));
                const content = data.choices?.[0]?.delta?.content || '';
                const reasoning = data.choices?.[0]?.delta?.reasoning_content || '';
                if (content) {
                  fullResponse += content;
                }
                if (reasoning) {
                  fullResponse += reasoning;
                }
                assistantDiv.textContent = fullResponse;
                middleBar.scrollTop = middleBar.scrollHeight;
              } catch (e) {}
            }
          }
        }

        messages.push({ role: 'assistant', content: fullResponse });

      } catch (err) {
        if (err.name === 'AbortError') {
          assistantDiv.textContent = fullResponse + '\n[Stopped]';
        } else {
          console.error('Fetch error details:', err);
          let errorDetail = err.message;
          if (err.cause) errorDetail += ' | cause: ' + (err.cause.message || JSON.stringify(err.cause));
          if (err.name) errorDetail += ' | type: ' + err.name;
          assistantDiv.textContent = `Error: ${errorDetail}\nURL: ${API_URL}\nStack: ${err.stack}`;
          assistantDiv.className = 'message error';
        }
      } finally {
        isGenerating = false;
        sendBtn.disabled = false;
        loading.style.display = 'none';
        abortController = null;
      }
    }

    sendBtn.addEventListener('click', send);

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 200) + 'px';
    });
  </script>
</body>
</html>
